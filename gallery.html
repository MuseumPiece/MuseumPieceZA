<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exhibition - MuseumPiece</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 40px 20px;
    }
    .mp-gallery {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }
    .mp-gallery-title {
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #f5f5f5;
    }
    .mp-gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .mp-gallery-grid img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <section class="mp-gallery">
    <h2 class="mp-gallery-title">Exhibition</h2>
    <div class="mp-gallery-grid">
      <img src="https://via.placeholder.com/400x300" alt="Artwork 1">
      <img src="https://via.placeholder.com/400x300" alt="Artwork 2">
      <img src="https://via.placeholder.com/400x300" alt="Artwork 3">
      <img src="https://via.placeholder.com/400x300" alt="Artwork 4">
    </div>
  </section>
</body>
</html>
